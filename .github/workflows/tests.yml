name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Unit tests — fast, pure logic, all BigQuery/Hail calls mocked
  # -------------------------------------------------------------------------
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (hail excluded — AoU-only, requires Java)
        run: |
          pip install --upgrade pip
          pip install --no-deps -e .
          pip install -r requirements-ci.txt

      - name: Run unit tests
        run: pytest tests/unit/ -m "not aou" -v --tb=short

  # -------------------------------------------------------------------------
  # Functional tests — run real regressions on synthetic data, no cloud
  # -------------------------------------------------------------------------
  functional:
    name: Functional tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: unit  # only run if unit tests pass

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (hail excluded — AoU-only, requires Java)
        run: |
          pip install --upgrade pip
          pip install --no-deps -e .
          pip install -r requirements-ci.txt

      - name: Run functional tests
        timeout-minutes: 15
        run: pytest tests/functional/ -m "not aou" -v --tb=short
