name: Publish to PyPI

on:
  release:
    types: [published]  # triggers when you publish a GitHub Release

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # Trusted publishing — no API token needed.
    # One-time setup on PyPI: go to your project > Publishing > Add publisher
    # and set: owner=nhgritctran, repo=PheTK, workflow=publish.yml
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build  # produces dist/*.whl and dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password needed — uses OIDC trusted publishing
